{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="text-center mb-4">Mis Tareas</h2>

<div class="card shadow-sm p-4 mb-4">
<form method="post">
    <div class="mb-3">
        <input type="text" class="form-control" name="title" placeholder="Título de la tarea" required>
    </div>
    <div class="mb-3">
        <textarea class="form-control" name="description" placeholder="Descripción"></textarea>
    </div>
    <button type="submit" class="btn btn-success w-100">Agregar Tarea</button>
</form>
</div>

<div class="list-group">
{% for task in tasks %}
<div class="list-group-item d-flex justify-content-between align-items-center {% if task.completed %}list-group-item-secondary text-decoration-line-through{% endif %}">
    <div>
        <strong>{{ task.title }}</strong><br>
        <small>{{ task.description }}</small>
    </div>
    <div>
        {% if not task.completed %}
        <a href="{{ url_for('complete_task', task_id=task.id) }}" class="btn btn-sm btn-outline-success me-1">Completar</a>
        {% endif %}
        <a href="{{ url_for('edit_task', task_id=task.id) }}" class="btn btn-sm btn-outline-primary me-1">Editar</a>
        <a href="{{ url_for('delete_task', task_id=task.id) }}" class="btn btn-sm btn-outline-danger">Eliminar</a>
    </div>
</div>
{% endfor %}
</div>
{% endblock %}
