{% extends "base.html" %}
{% block title %}Editar Tarea{% endblock %}
{% block content %}
<div class="card shadow-sm mx-auto p-4" style="max-width: 500px; border-radius: 15px;">
<h2 class="text-center mb-4">Editar Tarea</h2>
<form method="post">
    <div class="mb-3">
        <input type="text" class="form-control" name="title" value="{{ task.title }}" required>
    </div>
    <div class="mb-3">
        <textarea class="form-control" name="description">{{ task.description }}</textarea>
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="completed" id="completed" {% if task.completed %}checked{% endif %}>
        <label class="form-check-label" for="completed">Completada</label>
    </div>
    <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
</form>
<p class="text-center mt-3"><a href="{{ url_for('dashboard') }}">Volver al Dashboard</a></p>
</div>
{% endblock %}
